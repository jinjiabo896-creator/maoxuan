<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>红色指挥中心 10.0 · 实战指令版</title>
    <style>
        :root { --red: #8e2929; --gold: #c5a059; --army: #3d4a35; --paper: #f2ede4; --ink: #1a1a1a; }
        body { background-color: var(--ink); color: var(--paper); font-family: 'STKaiti', 'KaiTi', serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px 20px; border-bottom: 2px solid var(--red); }
        header h1 { font-size: 1.8rem; color: var(--gold); margin: 0; letter-spacing: 6px; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }

        /* 输入区 */
        .input-panel { background: rgba(255,255,255,0.03); border: 1px solid var(--army); padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        textarea { width: 100%; height: 90px; background: rgba(0,0,0,0.5); border: 1px solid var(--army); color: #fff; padding: 12px; box-sizing: border-box; font-family: inherit; font-size: 1rem; resize: none; border-radius: 4px; }

        /* 选择器 */
        .label-tag { font-size: 0.8rem; color: var(--gold); margin: 15px 0 10px; display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { background: #222; border: 1px solid #444; color: #888; padding: 12px; font-size: 0.8rem; cursor: pointer; border-radius: 4px; text-align: center; }
        .btn-opt.active { background: var(--army); color: var(--gold); border-color: var(--gold); font-weight: bold; }

        .btn-main { background: var(--red); color: white; border: 2px solid var(--gold); width: 100%; padding: 18px; border-radius: 4px; font-weight: bold; font-size: 1.2rem; margin-top: 25px; cursor: pointer; letter-spacing: 5px; }

        /* 战报区 */
        #result-view { display: none; margin-top: 30px; animation: slideUp 0.4s ease; }
        .archive { background: var(--paper); color: var(--ink); padding: 30px 20px; border-radius: 2px; position: relative; border: 1px solid #dcd7c9; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .seal { position: absolute; top: 15px; right: 15px; width: 60px; height: 60px; border: 2px solid var(--red); border-radius: 50%; color: var(--red); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; transform: rotate(15deg); opacity: 0.5; }
        
        .section { margin-bottom: 25px; }
        .section h4 { border-left: 5px solid var(--red); padding-left: 10px; margin: 0 0 10px; color: var(--red); font-size: 1.1rem; }
        .content { text-align: justify; line-height: 1.7; font-size: 1.05rem; }
        .cmd-item { background: rgba(0,0,0,0.05); padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid var(--army); }
        .cmd-item b { color: var(--red); display: block; margin-bottom: 4px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header><h1>战 略 指 挥 部 10.0</h1></header>

<div class="container">
    <div class="input-panel">
        <label class="label-tag">【输入当前敌我局势或困惑】</label>
        <textarea id="userInput" placeholder="例如：客户续费节奏乱，沟通没思路..."></textarea>

        <label class="label-tag">【判定当前斗争阶段】</label>
        <div class="grid" id="stageGrid">
            <div class="btn-opt active" onclick="setStage('def', this)">敌强我弱 (防御)</div>
            <div class="btn-opt" onclick="setStage('sta', this)">陷入僵持 (相持)</div>
        </div>

        <label class="label-tag">【请领战略指导方向】</label>
        <div class="grid" id="modeGrid">
            <div class="btn-opt active" onclick="setMode('con', this)">矛盾论 · 抓重点</div>
            <div class="btn-opt" onclick="setMode('uni', this)">统一战线 · 找外援</div>
            <div class="btn-opt" onclick="setMode('pro', this)">持久战 · 耗时间</div>
            <div class="btn-opt" onclick="setMode('pra', this)">实践论 · 去现场</div>
        </div>

        <button class="btn-main" onclick="startDeduction()">启 动 战 略 指 挥</button>
    </div>

    <div id="result-view">
        <div class="archive">
            <div class="seal">绝密<br>执行</div>
            <h2 style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-top:0;">战略执行建议书</h2>
            
            <div class="section">
                <h4>一、 思想降维拆解</h4>
                <div class="content" id="res-think"></div>
            </div>

            <div class="section">
                <h4>二、 具体战斗命令</h4>
                <div id="res-actions"></div>
            </div>

            <div style="text-align:center; font-size:0.7rem; color:#888; border-top:1px solid #ddd; padding-top:15px;">
                实事求是 · 理论联系实际
            </div>
        </div>
    </div>
</div>

<script>
    let currentMode = 'con';
    let currentStage = 'def';

    function setStage(s, el) {
        currentStage = s;
        document.querySelectorAll('#stageGrid .btn-opt').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function setMode(m, el) {
        currentMode = m;
        document.querySelectorAll('#modeGrid .btn-opt').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // 核心：深度实战逻辑引擎
    const LOGIC_ENGINE = {
        con: { // 矛盾论
            def: (q) => ({
                think: `针对“${q}”，现在最忌讳胡子眉毛一把抓。由于处于防御期，你感到的“乱”是因为你把次要矛盾当成了主要矛盾。现在续费不畅只是表象，主要矛盾是你提供的价值还没到让对方“离不开”的地步。`,
                cmds: [
                    { b: "【断舍离】", c: "停止对所有客户的本能沟通，挑出那20%最可能续费的，死磕他们。其他的先放一边。" },
                    { b: "【找针眼】", c: "不要谈续费，谈对方目前最头疼的一个问题。把那个“针眼”扎透，续费就是顺带的事。" }
                ]
            }),
            sta: (q) => ({
                think: `在相持阶段，你和“${q}”的关系处于磨洋工状态。现在的关键是寻找破局点。主要矛盾已经从“业务能力”转变成了“博弈耐力”。`,
                cmds: [
                    { b: "【打破平衡】", c: "制造一个小的利益点或新的危机感，打破目前的“死水一潭”。" },
                    { b: "【标准打击】", c: "把凭本能的沟通变成标准化的指令，用你的确定性去对冲客户的不确定性。" }
                ]
            })
        },
        uni: { // 统一战线
            def: (q) => ({
                think: `面对“${q}”，你现在是孤军奋战，所以觉得难。要把朋友搞得多多的。现在的障碍不是技术，是人心。`,
                cmds: [
                    { b: "【找斜杠盟友】", c: "找出对方公司里除了直接决策人之外，谁还希望能解决这个问题。拉拢他们成为你的内线。" },
                    { b: "【孤立顽固派】", c: "如果某个环节卡住了，不要硬碰硬，绕过去，联合其他部门向这个环节施压。" }
                ]
            })
        },
        pro: { // 持久战
            def: (q) => ({
                think: `你想速胜“${q}”，这就是错误。现在的困难是系统性的。你要做好打长线的准备，核心是“保存自己”。`,
                cmds: [
                    { b: "【降低期待】", c: "接受这个月就是拿不下，把精力转向保护基本盘，不让剩下的也乱掉。" },
                    { b: "【小步快跑】", c: "不求一蹴而就，每天只推进一个厘米。只要你还活着，对方就是在消耗生命。" }
                ]
            })
        },
        pra: { // 实践论
            def: (q) => ({
                think: `你对“${q}”的判断全是猜的。没有调查就没有发言权。你现在的焦虑来自于你脱离了群众，脱离了真实的一线数据。`,
                cmds: [
                    { b: "【去前线蹲坑】", c: "立刻停掉电脑沟通，亲自去客户公司或者现场看一眼他们到底是怎么操作的。" },
                    { b: "【解剖麻雀】", c: "找一个最失败的案例，从头到尾复盘每一分钟的通话记录，找出那个你主观以为但客观不存在的幻觉。" }
                ]
            })
        }
    };

    function startDeduction() {
        const q = document.getElementById('userInput').value;
        if(!q || q.length < 4) return alert("战况描述太简略，指挥部无法给出精确指令。");

        const resultView = document.getElementById('result-view');
        
        // 逻辑核验：确保每一路都有独特输出
        const dataFunc = LOGIC_ENGINE[currentMode][currentStage] || LOGIC_ENGINE[currentMode]['def'];
        const data = dataFunc(q.substring(0,15));

        document.getElementById('res-think').innerText = data.think;
        
        const cmdBox = document.getElementById('res-actions');
        cmdBox.innerHTML = "";
        data.cmds.forEach(item => {
            const div = document.createElement('div');
            div.className = 'cmd-item';
            div.innerHTML = `<b>${item.b}</b>${item.c}`;
            cmdBox.appendChild(div);
        });

        resultView.style.display = 'block';
        window.scrollTo({top: resultView.offsetTop - 20, behavior: 'smooth'});
    }
</script>
</body>
</html>
